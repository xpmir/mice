id: ettin_17M_search_merge_layer
title: "Ettin masking experiment"
description: Fine-tune a Ettin model with a margin MSE loss on BM25 negatives while applying masking.

    Starts from the checkpoint > jhu-clsp/ettin-encoder-17m

module: ir_training.merge_layer_search

gpu: true
seed: 12 # To mimick the HF xp 
nb_repetitions: 5

base: jhu-clsp/ettin-encoder-17m
pooling_method: cls

retriever: "" #BM25

attn_patches:
    # CLS can only send information to itself
    - mask_attention_from:
        - "query"
        - "sep_1"
        - "document"
        - "sep_2"
      mask_attention_to:
        - "cls"
    # Document can't use SEP1 for attention sink (nor CLS, handled above)
    - mask_attention_from:
        - "document"
      mask_attention_to:
        - "sep_1"
    # Query can't use SEP2 for attention sink (nor CLS, handled above)
    - mask_attention_from:
        - "query"
      mask_attention_to:
        - "sep_2"
    # SEP can attend to nothing (remove their attention sinks to see the impact)
    - mask_attention_from:
        - "sep_1"
      mask_attention_to:
        - "cls"
        - "query"
        - "document"
        - "sep_2"
    - mask_attention_from:
        - "sep_2"
      mask_attention_to:
        - "cls"
        - "query"
        - "sep_1"
        - "document"
    ### Step 1: Cut Attention from CLS to Document
    - mask_attention_from:
        - "cls"
      mask_attention_to:
        - "document"
        - "sep_2"
    ### Step 2: Cut Attention from Document to Query
    - mask_attention_from:
        - "document"
      mask_attention_to:
        - "query"
    ### Step 3: Cut Attention from CLS to Document
    - mask_attention_from:
        - "query"
      mask_attention_to:
        - "document"
      start_layer: 
        value: 0
      end_layer: 
        values_range: [0, 6]


preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=5)

validation:
    # Use 500 topics for validation
    size: 500

# This set of hyperparameters follows: https://github.com/huggingface/sentence-transformers/blob/9f76b5790fa8f0175ccdc27e41f9ae348f557144/examples/training/ms_marco/train_cross-encoder-v2.py
learner:
    optimization:
        steps_per_epoch: 100
        batch_size: 32
        max_epochs: 1250 # Sum is 2_500_000. Multiplied by BS of 32, it gives 80M samples, which is a bit above the size of the dataset
        num_warmup_steps: 5000 # Follows the original setup
        weight_decay: 0.00
        lr: 7e-6
        eps: 1.0e-8
    # sample_max: 2_000_000
    max_grad_norm: 1.0
    checkpoint_interval: 100
    validation_interval: 100
    validation_top_k: 100
    loss: marginMSE
    requirements: duration=2 days & cpu(cores=5) & cuda(mem=32G)

retrieval:
    requirements: duration=20h & cpu(cores=16) & cuda(mem=30G)
    k: 1000
    batch_size: 64

evaluation:
    test_max_topics: 0
    in_domain_only: true
    all_datasets: true

compare_with_baseline: true