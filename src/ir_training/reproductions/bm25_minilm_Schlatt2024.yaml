id: minilm_l12_reproduction_schlatt2024
title: "MiniLM-v2 masking experiment"
description: Fine-tune a MiniLM-v2 model with a margin MSE loss on BM25 negatives while applying masking.
    Starts from the checkpoint > microsoft/MiniLM-L12-H384-uncased
    Masking attention following the settings defined in Schlatt et al. 2024. (http://arxiv.org/abs/2312.17649)

module: ir_training.experiment

gpu: true
seed: 12 # To mimick the HF xp 
nb_repetitions: 5

base: microsoft/MiniLM-L12-H384-uncased
retriever: "" #BM25

attn_patches:
    # CLS can only send information to itself
    - mask_attention_from:
        - "query"
        - "sep_1"
      mask_attention_to:
        - "cls"
        - "document"
        - "sep_2"

preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=5)

validation:
    # Use 500 topics for validation
    size: 500

# This set of hyperparameters follows: https://github.com/huggingface/sentence-transformers/blob/9f76b5790fa8f0175ccdc27e41f9ae348f557144/examples/training/ms_marco/train_cross-encoder-v2.py
learner:
    optimization:
        steps_per_epoch: 100
        batch_size: 32
        max_epochs: 1250 # Sum is 2_500_000. Multiplied by BS of 32, it gives 80M samples, which is a bit above the size of the dataset
        num_warmup_steps: 5000 # Follows the original setup
        weight_decay: 0.00
        lr: 7e-6
        eps: 1.0e-8
    # sample_max: 2_000_000
    max_grad_norm: 1.0
    checkpoint_interval: 100
    validation_interval: 100
    validation_top_k: 100
    loss: marginMSE
    requirements: duration=2 days & cpu(cores=5) & cuda(mem=40G)

retrieval:
    requirements: duration=20h & cpu(cores=16) & cuda(mem=30G)
    k: 1000
    batch_size: 64

evaluation:
    test_max_topics: 0
    all_datasets: true

compare_with_baseline: true