id: monobert_bce_baseline
title: "MonoBERT baseline reproduction"
description: Fine-tuning on the IR task of a BERT-base

    Starts from the checkpoint > bert-base-uncased

module: ir_training.experiment

gpu: true
seed: 12 # To mimick the HF xp 
nb_repetitions: 1

base: bert-base-uncased
retriever: ""

preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=5)

validation:
    # Use 500 topics for validation
    size: 500

# This set of hyperparameters follows: https://arxiv.org/pdf/1901.04085
learner:
    optimization:
        steps_per_epoch: 100
        batch_size: 64
        max_epochs: 1000 # Sum is 2_500_000. Multiplied by BS of 128, it gives 320M samples, which is a bit above the size of the dataset
        num_warmup_steps: 5000 # Follows the original setup
        weight_decay: 0.01
        lr: 3e-6
        eps: 1.0e-8
    # sample_max: 2_000_000
    max_grad_norm: 0.0
    checkpoint_interval: 50
    validation_interval: 25
    validation_top_k: 100
    loss: PointWiseMSE
    requirements: duration=20h & cpu(cores=5) & cuda(mem=40G)

retrieval:
    requirements: duration=20h & cpu(cores=16) & cuda(mem=30G)
    k: 1000

evaluation:
    test_max_topics: 0
    all_datasets: true