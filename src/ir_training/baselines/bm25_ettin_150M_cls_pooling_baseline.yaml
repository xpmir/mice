id: ettin_margin_mse_baseline
title: "Ettin baseline reproduction"
description: Fine-tuning of a Etting model

    Starts from the checkpoint > jhu-clsp/ettin-encoder-32m

module: ir_training.experiment

gpu: true
seed: 12 # To mimick the HF xp 
nb_repetitions: 1

base: jhu-clsp/ettin-encoder-150m
pooling_method: cls

retriever: ""

preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=5)

validation:
    # Use 500 topics for validation
    size: 500

# This set of hyperparameters follows: https://huggingface.co/tomaarsen/ms-marco-ettin-32m-reranker
learner:
    optimization:
        steps_per_epoch: 100
        batch_size: 32
        max_epochs: 2000 # Sum is 2_500_000. Multiplied by BS of 32, it gives 80M samples, which is a bit above the size of the dataset
        num_warmup_steps: 5000 # Follows the original setup
        weight_decay: 0.00
        lr: 7e-6
        eps: 1.0e-8
    # sample_max: 2_000_000
    max_grad_norm: 1.0
    checkpoint_interval: 50
    validation_interval: 25
    validation_top_k: 100
    loss: marginMSE
    requirements: duration=100h & cpu(cores=5) & cuda(mem=32G)

retrieval:
    requirements: duration=20h & cpu(cores=16) & cuda(mem=30G)
    k: 1000

evaluation:
    test_max_topics: 0
    all_datasets: true