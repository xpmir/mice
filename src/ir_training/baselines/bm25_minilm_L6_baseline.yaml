id: minilm_margin_mse_baseline
title: "MiniLM-v2 baseline reproduction"
description: Reproduction of the fine-tuning from the paper | 
    "MiniLMv2 Multi-Head Self-Attention Relation Distillation for Compressing Pretrained Transformers" 
    (https://arxiv.org/abs/2012.15828)

    Starts from the checkpoint > nreimers/MiniLM-L6-H384-uncased

module: ir_training.experiment

gpu: true
seed: 12 # To mimick the HF xp 
nb_repetitions: 5

base: nreimers/MiniLM-L6-H384-uncased
retriever: "" #BM25

preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=5)

validation:
    # Use 500 topics for validation
    size: 500

# This set of hyperparameters follows: https://github.com/huggingface/sentence-transformers/blob/9f76b5790fa8f0175ccdc27e41f9ae348f557144/examples/training/ms_marco/train_cross-encoder-v2.py
learner:
    optimization:
        steps_per_epoch: 100
        batch_size: 32
        max_epochs: 1250 # 2500 Sum is 2_500_000. Multiplied by BS of 32, it gives 80M samples, which is a bit above the size of the dataset
        num_warmup_steps: 5000 # Follows the original setup
        weight_decay: 0.00
        lr: 7e-6
        eps: 1.0e-8
    # sample_max: 2_000_000
    max_grad_norm: 1.0
    checkpoint_interval: 100
    validation_interval: 25
    validation_top_k: 100
    loss: marginMSE
    requirements: duration=2 days & cpu(cores=5) & cuda(mem=30G)


retrieval:
    requirements: duration=20h & cpu(cores=16) & cuda(mem=30G)
    k: 1000

evaluation:
    test_max_topics: 0
    all_datasets: true