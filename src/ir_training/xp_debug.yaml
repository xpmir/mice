id: debug_masked_minilm_margin_mse_step1
title: "MiniLM-v2 masking experiment"
description: Fine-tune a MiniLM-v2 model with a margin MSE loss on BM25 negatives while applying masking.

    Starts from the checkpoint > microsoft/MiniLM-L12-H384-uncased

module: ir_training.experiment

gpu: true
seed: 12 # To mimick the HF xp 
nb_repetitions: 1

base: microsoft/MiniLM-L12-H384-uncased # jhu-clsp/ettin-encoder-32m  microsoft/MiniLM-L12-H384-uncased
retriever: "" #BM25

attn_patches:
    - mask_attention_from:
        - "query"
        - "sep_1"
        - "document"
        - "sep_2"
      mask_attention_to:
        - "cls"
      start_layer: 2
      end_layer: 8
    # Document can't use SEP1 for attention sink (nor CLS, handled above)
    - mask_attention_from:
        - "document"
      mask_attention_to:
        - "sep_1"
      start_layer: 2
      end_layer: 8
    # Query can't use SEP2 for attention sink (nor CLS, handled above)
    - mask_attention_from:
        - "query"
      mask_attention_to:
        - "sep_2"
      start_layer: 2
      end_layer: 8
    # SEP can attend to nothing (remove their attention sinks to see the impact)
    - mask_attention_from:
        - "sep_1"
      mask_attention_to:
        - "cls"
        - "query"
        - "document"
        - "sep_2"
      start_layer: 2
      end_layer: 8
    - mask_attention_from:
        - "sep_2"
      mask_attention_to:
        - "cls"
        - "query"
        - "sep_1"
        - "document"
      start_layer: 2
      end_layer: 8
    ### Step 1: Cut Attention from CLS to Document
    - mask_attention_from:
        - "cls"
      mask_attention_to:
        - "document"
        - "sep_2"
        - "sep_2"
        - "sep_2"

preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=5)

validation:
    # Use 500 topics for validation
    size: 500

# This set of hyperparameters follows: https://github.com/huggingface/sentence-transformers/blob/9f76b5790fa8f0175ccdc27e41f9ae348f557144/examples/training/ms_marco/train_cross-encoder-v2.py
learner:
    optimization:
        steps_per_epoch: 100
        batch_size: 32
        max_epochs: 10 # Sum is 2_500_000. Multiplied by BS of 32, it gives 80M samples, which is a bit above the size of the dataset
        num_warmup_steps: 5000 # Follows the original setup
        weight_decay: 0.00
        lr: 7e-6
        eps: 1.0e-8
    # sample_max: 2_000_000
    max_grad_norm: 1.0
    checkpoint_interval: 50
    validation_interval: 7
    validation_top_k: 100
    requirements: duration=2 days & cpu(cores=5) & cuda(mem=40G)

retrieval:
    requirements: duration=20h & cpu(cores=16) & cuda(mem=30G)
    batch_size: 128
    k: 1000

evaluation:
    test_max_topics: 100
    all_datasets: false