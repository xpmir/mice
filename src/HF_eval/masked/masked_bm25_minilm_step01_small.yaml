id: eval_masked_minilm_step01
title: "MiniLM-v2 masking experiment"
description: 
    Evaluate a trained MiniLM-v2 model on which we mask attention according to the 
    masking scheme in step 1.

module: HF_eval.masked_baselines

base: cross-encoder/ms-marco-MiniLM-L12-v2
gpu: true
seed: 12 # To mimick the HF xp 
retriever: "" #BM25

attn_patches:
    - mask_attention_from:
        - "query"
        - "sep_1"
        - "document"
        - "sep_2"
      mask_attention_to:
        - "cls"
    # Document can't use SEP1 for attention sink (nor CLS, handled above)
    - mask_attention_from:
        - "document"
      mask_attention_to:
        - "sep_1"
    # Query can't use SEP2 for attention sink (nor CLS, handled above)
    - mask_attention_from:
        - "query"
      mask_attention_to:
        - "sep_2"
    # SEP can only attend to themselves
    - mask_attention_from:
        - "sep_1"
      mask_attention_to:
        - "cls"
        - "query"
        - "document"
        - "sep_2"
    - mask_attention_from:
        - "sep_2"
      mask_attention_to:
        - "cls"
        - "query"
        - "sep_1"
        - "document"

preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=5)

retrieval:
    requirements: duration=20h & cpu(cores=16) & cuda(mem=30G)
    k: 1000

evaluation:
    test_max_topics: 0
    all_datasets: true