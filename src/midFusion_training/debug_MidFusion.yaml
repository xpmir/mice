id: debug_midFusion_minilm_mse_v2
title: "MidFusion MiniLM FineTunning experiment"
description: Fine-tune a MidFusion model with MarginMSE loss.
    Starts from the checkpoint > microsoft/MiniLM-L12-H384-uncased

module: midFusion_training.experiment

gpu: true
seed: 12 # To mimick the HF xp 
nb_repetitions: 1

preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=8)

# Model configuration
base: microsoft/MiniLM-L12-H384-uncased # jhu-clsp/ettin-encoder-32m  microsoft/MiniLM-L12-H384-uncased
merge_layer: 6
drop_layer: 11
use_self_attention: false
retriever: "" #BM25


# This set of hyperparameters follows: https://github.com/huggingface/sentence-transformers/blob/9f76b5790fa8f0175ccdc27e41f9ae348f557144/examples/training/ms_marco/train_cross-encoder-v2.py
learner:
    optimization:
        steps_per_epoch: 100
        batch_size: 32
        max_epochs: 1000 # 100 epochs ~30min 
        num_warmup_steps: 5000 # Follows the original setup
        weight_decay: 0.00
        lr: 7e-6
        eps: 1.0e-8
    # sample_max: 2_000_000
    max_grad_norm: 1.0
    checkpoint_interval: 100
    validation_interval: 20
    validation_top_k: 100
    requirements: duration=2 days & cpu(cores=8) & cuda(mem=40G)

validation:
    # Use 500 topics for validation
    size: 500

retrieval:
    requirements: duration=20h & cpu(cores=16) & cuda(mem=30G)
    batch_size: 128
    k: 1000

evaluation:
    test_max_topics: 100
    all_datasets: false

compare_with_baseline: false