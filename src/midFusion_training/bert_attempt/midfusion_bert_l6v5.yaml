id: midFusion_bert_l6v5
title: "MidFusion bert FineTunning experiment"
description: Fine-tune a MidFusion model with MarginMSE loss. Starts from the checkpoint > bert-base-uncased
    after results from drop_search experiment.
     - Fuse after layer 6
     - drop after layer 7

pre_experiment: ../../pre_experiment.py
module: midFusion_training.experiment

gpu: true
seed: 12 # To mimick the HF xp 
nb_repetitions: 2

preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=5)

# Model configuration
base: bert-base-uncased # jhu-clsp/ettin-encoder-32m  microsoft/MiniLM-L12-H384-uncased
merge_layer: 6
drop_layer: 11
retriever: "" #BM25


# This set of hyperparameters follows: https://arxiv.org/pdf/1901.04085
learner:
    optimization:
        steps_per_epoch: 100
        batch_size: 32
        max_epochs: 2500 # Sum is 2_500_000. Multiplied by BS of 128, it gives 320M samples, which is a bit above the size of the dataset
        num_warmup_steps: 10000 # Follows the original setup
        weight_decay: 0.01
        lr: 1e-6
        eps: 1.0e-8
    # sample_max: 2_000_000
    max_grad_norm: 10.0
    checkpoint_interval: 100
    validation_interval: 100
    validation_top_k: 100
    loss: marginMSE
    precision: bf16-mixed
    requirements: duration=20h & cpu(cores=5) & cuda(mem=80G)

retrieval:
    requirements: duration=20h & cpu(cores=16) & cuda(mem=30G)
    k: 1000
    batch_size: 64

evaluation:
    test_max_topics: 0
    in_domain_only: true
    # all_datasets: true
