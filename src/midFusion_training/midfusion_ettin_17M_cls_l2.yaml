id: midFusion_ettin_17M_l2_cls
title: "MidFusion Ettin-17M FineTunning experiment"
description: Fine-tune a MidFusion model with MarginMSE loss.

    Starts from the checkpoint > jhu-clsp/ettin-encoder-17m

module: midFusion_training.experiment

gpu: true
seed: 12 # To mimick the HF xp 
nb_repetitions: 5

preprocessing:
    requirements: duration=8h & cpu(cores=8)

indexation:
    requirements: duration=8h & cpu(cores=5)

# Model configuration
base: jhu-clsp/ettin-encoder-17m
pooling_method: cls
merge_layer: 2
retriever: "" #BM25


# This set of hyperparameters follows: https://github.com/huggingface/sentence-transformers/blob/9f76b5790fa8f0175ccdc27e41f9ae348f557144/examples/training/ms_marco/train_cross-encoder-v2.py
learner:
    optimization:
        steps_per_epoch: 100
        batch_size: 32
        max_epochs: 1250 # Sum is 2_500_000. Multiplied by BS of 32, it gives 80M samples, which is a bit above the size of the dataset
        num_warmup_steps: 5000 # Follows the original setup
        weight_decay: 0.00
        lr: 7e-6
        eps: 1.0e-8
    # sample_max: 2_000_000
    max_grad_norm: 1.0
    checkpoint_interval: 100
    validation_interval: 100
    validation_top_k: 100
    loss: marginMSE
    requirements: duration=2 days & cpu(cores=5) & cuda(mem=12G)

retrieval:
    requirements: duration=20h & cpu(cores=5) & cuda(mem=10G)
    k: 1000

evaluation:
    test_max_topics: 0
    all_datasets: false